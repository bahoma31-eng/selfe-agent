name: 🤖 Selfe Agent — Issue & Comment Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-selfe:
    # منع الحلقة اللانهائية — تجاهل ردود الروبوت نفسه
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-openai

      - name: Install dependencies
        run: pip install openai>=1.0.0

      # ── استخراج الرسالة حسب نوع الحدث ──────────────────
      - name: Extract message from Issue or Comment
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            BODY="${{ github.event.issue.body }}"
            MSG="العنوان: ${TITLE}

المحتوى:
${BODY}"
          else
            MSG="${{ github.event.comment.body }}"
          fi
          {
            echo "message<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── تشغيل الوكيل (non-interactive) ──────────────────
      - name: Run Selfe Agent
        id: selfe
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          USER_MESSAGE:     ${{ steps.extract.outputs.message }}
          MODEL_INDEX:      "1"
        run: python agent_ci.py

      # ── نشر الرد كـ comment على الـ Issue ────────────────
      - name: Post Selfe reply as comment
        uses: actions/github-script@v7
        with:
          script: |
            const reply = process.env.SELFE_REPLY || "⚠️ لم يتمكن الوكيل من توليد رد.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Selfe Agent:**\n\n${reply}\n\n---\n*مُشغَّل تلقائياً بواسطة [Selfe Agent](https://github.com/bahoma31-eng/selfe-agent)*`
            });
        env:
          SELFE_REPLY: ${{ steps.selfe.outputs.reply }}
