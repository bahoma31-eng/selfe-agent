name: Selfe Agent - Issue and Comment Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-selfe:
    # تجنّب الحلقة اللانهائية: تجاهل تعليقات الروبوت نفسه
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-openai

      - name: Install dependencies
        run: pip install openai>=1.0.0

      # ── استخراج رقم الـ Issue ──────────────────────────────────
      - name: Extract Issue Number
        id: issue_info
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── استخراج نص الرسالة (آمن من Shell Injection) ───────────
      - name: Extract message from Issue or Comment
        id: extract
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            MSG=$(printf '%s\n\n%s' "$ISSUE_TITLE" "$ISSUE_BODY")
          else
            MSG="$COMMENT_BODY"
          fi
          {
            echo "message<<EOF"
            printf '%s' "$MSG"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── تشغيل الوكيل ─────────────────────────────────────────
      - name: Run Selfe Agent
        id: selfe
        env:
          GEMINI_API_KEY_1:   ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:   ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:   ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4:   ${{ secrets.GEMINI_API_KEY_4 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          USER_MESSAGE:       ${{ steps.extract.outputs.message }}
          MODEL_INDEX:        "1"
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          ISSUE_NUMBER:       ${{ steps.issue_info.outputs.number }}
        run: python agent_ci.py

      # ── نشر الرد كـ comment ───────────────────────────────────
      - name: Post Selfe reply as comment
        uses: actions/github-script@v7
        with:
          script: |
            const reply = process.env.SELFE_REPLY || "⚠️ لم يتمكن الوكيل من توليد رد.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Selfe Agent:**\n\n${reply}\n\n---\n*Triggered automatically by [Selfe Agent](https://github.com/bahoma31-eng/selfe-agent)*`
            });
        env:
          SELFE_REPLY: ${{ steps.selfe.outputs.reply }}
