name: Selfe Agent - Issue and Comment Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-selfe:
    # تجنّب الحلقة اللانهائية: تجاهل تعليقات الروبوت نفسه
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests

      # ── إنشاء secrets_map.json تلقائياً إذا لم يكن موجوداً ──────
      - name: Ensure secrets_map.json exists
        run: |
          if [ ! -f secrets_map.json ]; then
            echo 'Creating default secrets_map.json...'
            cat > secrets_map.json << 'EOF'
          {
            "_comment": "Add any new secret name here to pass it automatically to the agent. Do NOT put secret values here.",
            "secrets": [
              "GROQ_API_KEY",
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASS",
              "SMTP_PASSWORD",
              "NOTION_TOKEN",
              "OPENAI_API_KEY",
              "ANTHROPIC_API_KEY",
              "PAT_TOKEN",
              "GITHUB_PAT",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
              "DISCORD_WEBHOOK_URL",
              "SLACK_WEBHOOK_URL",
              "TWILIO_ACCOUNT_SID",
              "TWILIO_AUTH_TOKEN",
              "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY",
              "AWS_REGION",
              "GOOGLE_API_KEY",
              "FIREBASE_API_KEY",
              "SUPABASE_URL",
              "SUPABASE_KEY",
              "DATABASE_URL",
              "MONGODB_URI",
              "STRIPE_SECRET_KEY",
              "PAYPAL_CLIENT_ID",
              "PAYPAL_CLIENT_SECRET",
              "API_KEY",
              "SECRET_KEY",
              "WEBHOOK_URL"
            ]
          }
          EOF
            git config user.name "Agent Bot"
            git config user.email "agent@bot.com"
            git add secrets_map.json
            git commit -m "chore: add default secrets_map.json"
            git push
          else
            echo 'secrets_map.json already exists.'
          fi

      # ── كتابة الـ secrets في agent_secrets.env من secrets_map.json ──
      - name: Write secrets to agent_secrets.env
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          with open("secrets_map.json") as f:
              data = json.load(f)

          secret_names = data.get("secrets", [])

          # إضافة GITHUB_TOKEN دائماً
          env_token = os.environ.get("GITHUB_TOKEN_SECRET", "")
          available = []
          lines = []

          for name in secret_names:
              val = os.environ.get(name, "")
              lines.append(f"{name}={val}")
              if val:
                  available.append(name)

          # إضافة GITHUB_TOKEN
          lines.append(f"GITHUB_TOKEN={env_token}")
          if env_token:
              available.append("GITHUB_TOKEN")

          with open("agent_secrets.env", "w") as f:
              f.write("\n".join(lines) + "\n")

          with open("available_secrets.txt", "w") as f:
              f.write("\n".join(available) + "\n")

          print(f"✅ agent_secrets.env written with {len(lines)} entries")
          print(f"📋 Available secrets ({len(available)}): {available}")
          PYEOF

      # ── تشغيل Planner Agent ───────────────────────────────────────
      - name: Run Planner Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AVAILABLE_SECRETS_FILE: available_secrets.txt
        run: python selfe_notion_agent/agents/planner.py

      # ── حفظ plan_task.md ──────────────────────────────────────────
      - name: Commit plan_task.md
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@bot.com"
          git add plan_task.md task_*.json || true
          git diff --staged --quiet || git commit -m "plan: Issue #${{ github.event.issue.number }}"
          git push

      # ── تشغيل Executor Agent ──────────────────────────────────────
      - name: Run Executor Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SECRETS_ENV_FILE: agent_secrets.env
          AVAILABLE_SECRETS_FILE: available_secrets.txt
        run: python selfe_notion_agent/agents/executor.py

      # ── حفظ المخرجات ──────────────────────────────────────────────
      - name: Commit outputs and updated plan
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@bot.com"
          git add plan_task.md task_*.json output/ || true
          git diff --staged --quiet || git commit -m "done: Issue #${{ github.event.issue.number }} all phases completed"
          git push

      # ── إغلاق الـ Issue ───────────────────────────────────────────
      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
