name: Selfe Agent - Issue and Comment Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-selfe:
    # تجنّب الحلقة اللانهائية: تجاهل تعليقات الروبوت نفسه
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq

      # ── استخراج رقم الـ Issue ──────────────────────────────────
      - name: Extract Issue Number
        id: issue_info
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── تشغيل Planner Agent ───────────────────────────────────
      - name: Run Planner Agent
        id: planner
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          ISSUE_BODY:        ${{ github.event.issue.body }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python selfe_notion_agent/agents/planner.py

      # ── حفظ plan_task.md في الـ repo ─────────────────────────
      - name: Commit plan_task.md
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@bot.com"
          git add plan_task.md
          git diff --staged --quiet || git commit -m "plan: Issue #${{ github.event.issue.number }}"
          git push

      # ── تشغيل Executor Agent ──────────────────────────────────
      - name: Run Executor Agent
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
        run: python selfe_notion_agent/agents/executor.py

      # ── حفظ المخرجات ─────────────────────────────────────────
      - name: Commit outputs and updated plan
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@bot.com"
          git add plan_task.md selfe_notion_agent/output/
          git diff --staged --quiet || git commit -m "done: Issue #${{ github.event.issue.number }} all phases completed"
          git push

      # ── إغلاق الـ Issue تلقائياً ─────────────────────────────
      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Planner Agent:** تم إنشاء خطة التنفيذ وإتمام جميع المراحل!\n\n---\n*Triggered automatically by [Selfe Notion Agent](https://github.com/bahoma31-eng/selfe-agent)*`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
